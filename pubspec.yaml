name: flutter_xlog_ffi
description: A Flutter FFI plugin that packages Tencent mars xlog for Android and iOS logging.
version: 0.0.2
homepage: https://github.com/goshgame/flutter_xlog
repository: https://github.com/goshgame/flutter_xlog
issue_tracker: https://github.com/goshgame/flutter_xlog/issues
topics:
  - logging
  - xlog
  - ffi
  - mars
  - native

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
